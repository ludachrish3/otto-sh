name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Final-version tags only (e.g. v0.1.1, v1.2.0). Prerelease tags
  # (v0.1.1rc1, v0.1.1a2, v0.1.1b1, v0.1.1.dev0) are skipped — those
  # are intended for release-testpypi.yml via workflow_dispatch.
  guard:
    name: Gate prereleases
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - id: check
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping: $REF is not a final-version tag (expected vX.Y.Z)."
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build distribution
    needs: guard
    if: needs.guard.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [guard, build]
    if: needs.guard.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
