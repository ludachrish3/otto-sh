name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force Rich/typer to render help and error output without ANSI styling.
      # GitHub-Actions runners set PY_COLORS/FORCE_COLOR, which makes Rich emit
      # bold/dim SGR codes that split flag names like '--region' across escapes
      # and break substring assertions in tests.
      NO_COLOR: "1"
      TERM: dumb
      FORCE_COLOR: ""
      CLICOLOR_FORCE: ""
      PY_COLORS: ""
      CLICOLOR: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run CI pipeline
        run: make ci
