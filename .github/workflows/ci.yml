name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Force Rich/typer to render help and error output without ANSI styling.
  # GitHub-Actions runners set PY_COLORS/FORCE_COLOR, which makes Rich emit
  # bold/dim SGR codes that split flag names like '--region' across escapes
  # and break substring assertions in tests.
  NO_COLOR: "1"
  TERM: dumb
  FORCE_COLOR: ""
  CLICOLOR_FORCE: ""
  PY_COLORS: ""
  CLICOLOR: ""

jobs:
  tests:
    name: tests_hostless-${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Run tests under Python ${{ matrix.python }}
        run: uv run nox -s tests_hostless-${{ matrix.python }}

  # Repeat the whole tests/unit tree twice in one process to catch tests that
  # leak process-global state — registry singletons (INSTRUCTIONS, LOADER_CLASSES,
  # CLI_COMMANDS, SUITES), tmp-path imports, or otto.cli.* module identity. Such a
  # leak passes the single-pass `tests` job above but breaks on the second run, so
  # it only ever surfaced in the nightly `--count` matrix — days after landing
  # (issue #108). This fast, no-VM, single-Python job moves that guard onto the
  # pre-merge fast path. It is kept separate from `tests` because it needs no
  # Python matrix and the tests_unit_repeat session clears addopts to run
  # single-process (under -n auto the repeats scatter across workers and mask
  # cross-module leaks).
  unit-repeat:
    name: unit-repeat (test-isolation guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Repeat tests/unit in one process (test-isolation leak guard)
        run: uv run nox -s tests_unit_repeat

  # One parallel job per browser engine (Blink/Gecko/Safari) — the nox
  # `dashboard` session is parametrized by browser, and this matrix runs each
  # variant on its own runner so wall-clock is a single engine's runtime, not
  # three back-to-back. fail-fast: false so one engine's failure doesn't cancel
  # the others (you want to see all engine results). The Safari-specific test
  # is @only_browser("webkit"), so it runs only in the webkit leg and skips on
  # the others.
  dashboard:
    name: dashboard-e2e (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      # Post-cutover, the browser suite exercises the built React dashboard
      # (src/otto/monitor/static/dist/) through a real MonitorServer — there
      # is no legacy static fallback anymore, so `dist/` must exist before
      # the pytest steps below run. `make web` also re-runs the type-drift
      # gate (web/src/api/types.gen.ts vs. the live pydantic models) and the
      # air-gap grep, so a wire-contract or CDN-URL regression fails here
      # rather than surfacing later as a flaky e2e test.
      - name: Install web/ dependencies (npm ci)
        run: make web-install
      - name: Build the React dashboard (type-drift + air-gap gates)
        run: make web
      # Unit tests + coverage run in the dedicated web-quality job; this job
      # builds the dashboard purely for the browser e2e that follows. Install
      # only this leg's engine (+ its system libs).
      - name: Install ${{ matrix.browser }} with system dependencies
        run: uv run --group dev playwright install --with-deps ${{ matrix.browser }}
      - name: Run dashboard browser e2e (${{ matrix.browser }})
        run: uv run nox -k ${{ matrix.browser }}

  # web/ TypeScript quality gates (Biome lint + format, tsc, vitest v8
  # coverage) — the TS analogue of the lint/typecheck jobs. Node-only: no
  # Python, no browsers, no dashboard build, so it runs fast and in parallel.
  web-quality:
    name: web-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install web/ dependencies (npm ci)
        run: make web-install
      - name: Lint (Biome)
        run: make web-lint
      - name: Format check (Biome)
        run: make web-format-check
      - name: Type-check (tsc --noEmit)
        run: make web-typecheck
      - name: Unit tests + coverage floor (vitest v8)
        run: make web-coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv python install 3.10
      - run: uv run nox -s lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv python install 3.10
      - run: uv run nox -s typecheck

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      # graphviz `dot` renders the architecture-docs diagrams. ubuntu-latest
      # images currently preinstall it, but that set is not contractual —
      # install explicitly so the docs gate never depends on image contents.
      - run: sudo apt-get install -y graphviz
      - run: uv python install 3.10
      # scripts/capture_docs_media.py (hooked from docs/conf.py, every HTML
      # build) drives a real MonitorServer to screenshot the dashboard —
      # post-cutover that server refuses to start without a built React
      # dashboard, so `dist/` must exist before `nox -s docs` runs. Building
      # it here (rather than falling back to OTTO_DOCS_MEDIA=placeholder)
      # keeps this gate an honest rehearsal of what Read the Docs' own build
      # does (see .readthedocs.yaml) — placeholder mode stays reserved for
      # its documented emergency case (e.g. a broken Chromium install), not
      # routine CI.
      #
      # KEEP THESE STEPS. The dashboard capture is temporarily stubbed
      # (`_LIVE_DASHBOARD_RETIRED` — the review-first shell has no live mode
      # to photograph), so no MonitorServer starts and `dist/` is not strictly
      # required *right now*. It is required again the moment that capture is
      # restored at monitor-view parity, and RTD builds the dist regardless.
      - name: Install web/ dependencies (npm ci)
        run: make web-install
      - name: Build the React dashboard (needed by capture_docs_media.py)
        run: make web
      # Headless Chromium captures the build-time GUI media (screenshots +
      # clips) via scripts/capture_docs_media.py, hooked from docs/conf.py.
      # --with-deps also apt-installs the browser's runtime libraries.
      - run: uv run playwright install --with-deps chromium
      - run: uv run nox -s docs

  # If any job above fails on a push to main, open (or update) a tracking
  # issue so a broken main surfaces without anyone having to watch the
  # Actions tab. Skipped for pull_request — PR failures are already visible
  # to the PR author in the checks UI.
  report-failure:
    name: Open issue on failure
    needs: [lint, tests, unit-repeat, dashboard, web-quality, typecheck, docs]
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Write issue body
        run: |
          {
            echo "A CI run on \`main\` failed."
            echo
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo
            echo "Check the job logs to see which of lint / tests / unit-repeat / dashboard / web-quality / typecheck / docs failed."
          } > issue-body.md

      - name: Create issue from file
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "CI failed on main"
          content-filepath: issue-body.md
          labels: ci
