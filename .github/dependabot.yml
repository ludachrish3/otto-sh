version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"

  # web/ React+TS monitor dashboard (npm, committed package-lock.json).
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    groups:
      # vitest and @vitest/coverage-v8 pin each other with an EXACT peer
      # version, so a lone bump of either can never pass npm ci (PRs
      # #114/#119 both died on ERESOLVE). Tailwind's core + vite plugin
      # move in lockstep releases the same way (#150/#152).
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
