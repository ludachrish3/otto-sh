name = "repo3"
version = "1.0.0"
lab_data_type = "json"

# Embedded coverage bed. Full design: ../../../todo/embedded_coverage.md;
# bring-up record: docs/feasibility.md.
#
# The coverage target is the `sprout_cov` mps2_an385 instance in the shared
# tech1 lab data — a stock Zephyr LLEXT loader base (built from
# samples/subsys/llext/shell_loader, see ../../firmware/zephyr/configs/cov_an385)
# reached over a QEMU `-serial telnet:` bridge. The instrumented product
# (product/) is loaded at runtime; the base carries no coverage code.
labs = [
    "${sutDir}/../lab_data/tech1",
]
libs = [
    "${sutDir}/pylib",
]
tests = [
    "${sutDir}/tests",
]
init = [
    'repo3_instructions',
]

# Reuse repo1's zephyr-* os_profiles pattern. Per embedded_cortex_m_migration.md
# the board (qemu_cortex_m3 vs qemu_x86) is a firmware-build detail, NOT an
# os_profile field, so these profiles stay board-agnostic. (The repo1 "zephyr-2.7"
# inline-retcode profile is intentionally omitted: it needs the zephyr-inline
# command frame that repo1_instructions registers, which repo3 does not carry.)
[os_profiles."zephyr-3.7"]
base = "embedded"
osName = "Zephyr"
osVersion = "3.7"
command_frame = "zephyr"
transfer = "console"
max_filename_len = 32

[os_profiles."zephyr-4.4"]
base = "embedded"
osName = "Zephyr"
osVersion = "4.4"
command_frame = "zephyr"
transfer = "console"
max_filename_len = 32

[coverage]
# Embedded coverage uses console transport, not a remote .gcda directory, so the
# Unix `gcda_remote_dir` key does not apply. The embedded path instead drives
# `llext call_fn cov_dump` over the console (EmbeddedGcdaCollector), decodes the
# hex stream to .gcda on the host, and runs a cross-gcov (arm-zephyr-eabi-gcov)
# discovered from the .gcno under [coverage.embedded].build_dir.

[coverage.embedded]
# LLEXT extension name — matches add_llext_target(cov_ext) in product/. otto
# dumps each embedded host via `llext call_fn cov_ext cov_dump`.
extension = "cov_ext"

# Cross-gcov for the report, named explicitly (a .gcno embeds no compiler path,
# and otto must not assume a build system). Must match the GCC that built the
# product; here the Zephyr SDK's arm-zephyr-eabi-gcov (gcc 12.2). Absolute path
# on the dev VM where `otto test` runs. See product/README.md ("GCC coupling").
gcov = "/home/vagrant/zephyr-sdk-0.16.8/arm-zephyr-eabi/bin/arm-zephyr-eabi-gcov"

# The extension's build dir: holds the .gcno + source used as the report's
# source root. Absolute, on the dev VM where the product is built. See product/.
build_dir = "/home/vagrant/build/cov_ext_app"
