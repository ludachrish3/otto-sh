# otto Zephyr test-bed — shared Kconfig overlay (applied to every config).
#
# This is intentionally stock Zephyr: no otto-specific shell commands, no
# custom modules. The whole point of otto's embedded-host support is that it
# meets the target as-is; the overlay only enables the standard Zephyr Kconfig
# options otto requires (the way otto requires sshd on a Unix host).
#
# Per-filesystem deltas live in `tests/firmware/zephyr/configs/<id>/overlay.conf`
# and are layered onto this one via Zephyr's `-DEXTRA_CONF_FILE="a;b"` semicolon
# list. This file holds only what is true for every config.

# --- Shell over telnet -------------------------------------------------------

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_KERNEL_SHELL=y

# `fs write` (in configs that have a filesystem) carries each byte as ~3
# characters of hex text on the shell command line. Raise the shell's
# argument-count and command-buffer ceilings so otto can push a useful batch
# of bytes per call — the console backend's chunk size is 32 bytes (~35 args,
# ~115 characters). Harmless on configs without `fs` (`no_fs`).
CONFIG_SHELL_ARGC_MAX=64
CONFIG_SHELL_CMD_BUFF_SIZE=512

# `CONFIG_FILE_SYSTEM_SHELL` depends on `HEAP_MEM_POOL_SIZE > 0` — Kconfig
# silently drops the symbol if the default-zero heap is left in place,
# leaving the firmware booted with the FS mounted but no `fs` shell command
# registered. 16 KB is enough for the shell's `fs read/write` buffers on
# qemu_x86 with both FAT and LittleFS; harmless on the no-fs config.
CONFIG_HEAP_MEM_POOL_SIZE=16384

# --- Thread introspection (universal across the LTS matrix) ------------------
# THREAD_RUNTIME_STATS and the thread name/stack symbols exist on every LTS
# built here (2.7, 3.7, 4.x). The per-thread CPU% *detail* (SCHED_THREAD_USAGE
# / _ANALYSIS, which drive the `kernel threads` percentage columns) was added
# after 2.7, so it lives in the per-version supplement `otto-overlay-<ver>.conf`
# — present for 3.7 / 4.x, absent for 2.7. 2.7 therefore reports threads
# without CPU percentages, which is itself useful version variance for otto's
# monitoring parsers. (Assigning an undefined Kconfig symbol is a hard error
# under these versions' strict overlay checking, so the split is mandatory,
# not cosmetic.)

CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# --- Networking: Ethernet (e1000) with static IPv4 ---------------------------
# Each instance lives on its own ``/30`` so the host VM has a distinct route
# per TAP — putting them on a shared ``/24`` produced three overlapping
# routes and the kernel picked one, making the other two unreachable.
# Each config's overlay.conf supplies its own ``MY_IPV4_ADDR`` /
# ``PEER_IPV4_ADDR`` / ``NETMASK`` (always ``255.255.255.252`` for /30).

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_QEMU_ETHERNET=y
# The shell_module sample has no networking layer of its own, so the overlay
# must supply the whole Ethernet driver chain. The QEMU-ethernet flag above
# only declares intent; the build aborts with "No Qemu ethernet driver
# configured" unless a real driver is enabled. ETH_E1000 is a PCIe NIC on
# qemu_x86 (bound by the systemd unit's `-device e1000`), so it needs PCIE +
# NET_L2_ETHERNET. On 3.7 / 4.x the ethernet drivers additionally sit behind a
# `menuconfig ETH_DRIVER` gate — supplied in the per-version
# `otto-overlay-<ver>.conf`. 2.7 has no such symbol (its drivers are ungated),
# which is exactly why ETH_DRIVER can't live in this shared file.
CONFIG_NET_L2_ETHERNET=y
CONFIG_PCIE=y
CONFIG_ETH_E1000=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y

# Network packet/buffer pool sizing — the stock defaults (4 NET_PKT, 16
# NET_BUF on RX/TX each) are sized for an idle shell, not for otto's
# fan-out workload: ``do_for_all_hosts(EmbeddedHost.put, ...)`` fires
# hundreds of rapid-fire ``fs write`` chunks across multiple concurrent
# telnet sessions, and the e1000 driver exhausts the buffer pool within
# ~90 seconds (``<err> eth_e1000: Out of buffers``) — after which ARP
# replies stop and the instance goes dark until restart.
#
# The earlier 32 / 64 sizing covered the telnet fan-out alone. The SNMP
# monitoring agent (below) added a *second* sustained traffic source on
# the same e1000 NIC — ``MetricCollector`` polls every agent-capable
# backend on a timer, concurrently with the transfer/stability tests —
# which the fan-out-only sizing never accounted for, and the combined
# load re-exhausts the pool (the 3.7 FAT-on-RAM-disk config wedges first).
# Doubled to 64 / 128 to cover both channels. Each NET_PKT costs ~80 B and
# each NET_BUF carries a 128-byte payload; even the bumped counts
# (64×2 + 128×2 ≈ 43 KiB) are negligible next to the 100 MiB filesystems
# and the 128 MiB dram0.
#
# NB: if an instance still wedges under load after this bump, the cause is
# more likely a buffer *reclaim/leak* path than steady-state demand —
# 16× the original buffers only delayed the first wedge from ~90 s to
# ~230 s, which scales like accumulation, not a fixed working set. The
# bed health-check (see the zephyr-qemu watchdog) is the backstop that
# turns that into a loud, attributable signal instead of a silent stall.
CONFIG_NET_PKT_RX_COUNT=64
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128

# --- SNMP monitoring agent (separate channel from the telnet shell) ----------
# The single Zephyr telnet session is otto's command-execution console; metrics
# can't ride it without contending. otto's out-of-tree SNMP agent module
# (tests/firmware/zephyr/snmp_agent, pulled in via the extra-modules CMake var
# in the Vagrantfile) listens on UDP/161 and serves a fixed read-only OID table
# that otto's SNMP manager polls over a relay on the zephyr VM.
#
# UDP is needed for SNMP (the stack otherwise enables only TCP above);
# NET_SOCKETS is already on. UDP is a universal symbol, harmless where the agent
# is off, so it stays in this shared file.
#
# The agent itself is *enabled* (CONFIG_OTTO_SNMP_AGENT=y) only in the 3.7/4.x
# per-version supplements, NOT here: the agent C targets the Zephyr 3.0+
# `zephyr/`-prefixed include layout and the newer no-arg SYS_INIT signature, so
# it does not compile on 2.7. Registering the module (Vagrantfile) still *defines*
# the symbol on 2.7, so 2.7 simply builds with the agent off. Enabling 2.7 is a
# follow-up: add the old <kernel.h>-style includes and the (const struct device*)
# SYS_INIT signature behind a version guard, then add the =y to a 2.7 supplement.
CONFIG_NET_UDP=y
