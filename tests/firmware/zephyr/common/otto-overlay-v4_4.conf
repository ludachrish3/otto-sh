# otto Zephyr test-bed — per-version supplement for Zephyr 4.4.
#
# Layered between `common/otto-overlay.conf` and each config's `overlay.conf`
# by the Vagrantfile build loop (only when this file exists for the version
# being built). Same role as `otto-overlay-v3_7.conf`: the symbols present on
# 4.x but absent on 2.7, kept out of the shared cross-version overlay.
#
# (4.x carries other otto-observable interface changes too — `fs cp`/`fs mv`,
# the `fs ls` size column, and the `kernel threads` -> `kernel thread list`
# subcommand-tree rename — but those are command-surface differences otto
# exercises at runtime, not Kconfig knobs, so nothing is needed here for them.)

# Per-thread CPU% detail behind `kernel thread` (added after 2.7). Pairs with
# CONFIG_THREAD_RUNTIME_STATS in the shared overlay.
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y

# 4.x (like 3.x) gates the ethernet drivers behind `menuconfig ETH_DRIVER`;
# ETH_E1000 in the shared overlay is only selectable when this is set.
CONFIG_ETH_DRIVER=y
