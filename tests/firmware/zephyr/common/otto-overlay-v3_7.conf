# otto Zephyr test-bed — per-version supplement for Zephyr 3.7 LTS.
#
# Layered between `common/otto-overlay.conf` and each config's `overlay.conf`
# by the Vagrantfile build loop (only when this file exists for the version
# being built). It holds the symbols that exist on 3.7 but NOT on the oldest
# LTS in the matrix (2.7), so the shared `common/otto-overlay.conf` stays the
# true cross-version intersection and 2.7 doesn't abort on undefined symbols.

# Per-thread CPU% detail behind `kernel threads` (added after 2.7). Pairs with
# CONFIG_THREAD_RUNTIME_STATS in the shared overlay.
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y

# 3.x gates the ethernet drivers behind a `menuconfig ETH_DRIVER`; ETH_E1000
# (enabled in the shared overlay) is only selectable when this is set. 2.7 has
# no such gate, so this symbol is undefined there.
CONFIG_ETH_DRIVER=y

# Enable otto's SNMP agent here (not in the shared overlay): its C targets the
# Zephyr 3.0+ `zephyr/`-prefixed includes and no-arg SYS_INIT, so it builds on
# 3.7/4.x but not 2.7. The module is registered on every version (Vagrantfile),
# which defines the symbol; only this =y makes it compile.
CONFIG_OTTO_SNMP_AGENT=y

# System-heap runtime stats back the SNMP agent's heap-used / heap-free OIDs
# (see tests/firmware/zephyr/snmp_agent). The agent #ifdef-guards on this, so
# leaving it out on 2.7 (which has no such supplement) is fine — those two
# OIDs simply report 0 there.
CONFIG_SYS_HEAP_RUNTIME_STATS=y
