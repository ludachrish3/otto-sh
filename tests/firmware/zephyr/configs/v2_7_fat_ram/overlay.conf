# otto Zephyr test-bed — FAT on RAM disk config delta (Zephyr 2.7 LTS).
#
# Layered onto `common/otto-overlay.conf`. Structurally identical to the
# v3_7_fat_ram config — Zephyr 2.7 ships the same unified `CONFIG_SHELL` +
# FATFS + DISK_DRIVER_RAM subsystems as 3.7, with the same Kconfig names for
# the symbols we touch. Only the per-instance IP differs.
#
# NOTE: symbol parity with 3.7 is the expectation, not a proof — confirm on
# first `vagrant provision zephyr`. If a symbol is renamed or absent in 2.7,
# add the version-specific delta here rather than fragmenting
# common/otto-overlay.conf.

# --- IPv4 assignment (2.7 FAT instance, /30 subnet 192.0.2.12/30) ------------
# Zephyr=192.0.2.13, host=192.0.2.14. See common/otto-overlay.conf for the
# /30 rationale.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.13"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.14"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"

# --- FAT on a RAM disk + fs shell -------------------------------------------

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_RAM=y

# A fresh RAM disk has no filesystem on it — let the FAT layer format it on
# first mount rather than requiring a pre-imaged disk. 2.7 predates the
# generic CONFIG_FILE_SYSTEM_MKFS (fs_mkfs API, added in 3.x); the FATFS-
# specific mount-time format knob below is standalone here and is all that's
# needed. (3.7/4.4 carry both — see configs/v3_7_fat_ram/overlay.conf.)
CONFIG_FS_FATFS_MOUNT_MKFS=y

# Long File Name support — without this FAT enforces the legacy 8.3 limit
# (12-char basename including extension), and any longer name fails
# ``fs_open`` with ``-ENOENT``. The buffer size is mirrored on the host side
# by ``EmbeddedHost.max_filename_len`` (see ``tests/lab_data/tech1/hosts.json``).
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_BSS=y
CONFIG_FS_FATFS_MAX_LFN=32

# MMU virtual-mapping region. Must be >= the physical RAM region (``dram0``,
# expanded to 128 MiB in app.overlay to fit the 100 MiB RAM-disk). The stock
# qemu_x86 default is too small, leaving the kernel unable to map dram0 in
# full. 0x08000000 = 128 MiB matches the dram0 size precisely.
CONFIG_KERNEL_VM_SIZE=0x08000000
