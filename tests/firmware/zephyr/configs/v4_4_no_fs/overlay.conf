# otto Zephyr test-bed — "no filesystem" config delta (Zephyr 4.4).
#
# Layered onto `common/otto-overlay.conf`. This config is intentionally
# minimal: it enables nothing beyond what the shared overlay provides. The
# resulting firmware has the Zephyr shell, networking, and runtime stats —
# but **no `fs` shell command** at all (because `CONFIG_FILE_SYSTEM_SHELL`
# is not set).
#
# Purpose: exercise `EmbeddedFileTransfer`'s graceful-degradation path
# against a real target — not just a mock. When otto runs `fs read` on this
# instance, the Zephyr shell returns `fs: command not found`, and the
# console backend must surface a clear error rather than hang or write
# garbage. Pairs with the unit test that fakes the same response.
#
# No `app.overlay` exists for this config — `qemu_x86`'s stock devicetree is
# sufficient. The Vagrantfile build line omits `-DEXTRA_DTC_OVERLAY_FILE=`
# for `no_fs`.

# --- IPv4 assignment (no-fs instance, /30 subnet 192.0.2.32/30) --------------
# Zephyr=192.0.2.33, host=192.0.2.34. See common/otto-overlay.conf for the
# /30 rationale.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.33"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.34"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"
