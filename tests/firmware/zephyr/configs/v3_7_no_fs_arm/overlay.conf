# otto Zephyr test-bed — ARM (mps2_an385) "no filesystem" config delta.
#
# The Cortex-M sibling of configs/v3_7_no_fs (qemu_x86). It is the *one* ARM
# contract host — see the 2026-06-06 scope decision in
# docs/superpowers/plans/2026-06-05-embedded-arm-bed-migration.md. Its job is to
# prove otto's *contract* surface — the zephyr-serial frame handshake, the
# kernel shell, and EmbeddedFileTransfer's graceful-degradation path — against a
# real Cortex-M target over the serial bridge. (LLEXT coverage on ARM is proven
# separately by sprout_cov / sprout_cov44; this host loads no extension.)
#
# Unlike the x86 configs, this is NOT layered on common/otto-overlay.conf. That
# shared overlay hard-codes the telnet shell backend and the e1000 PCIe NIC —
# neither exists on mps2_an385 (no PCIe; a LAN9118 NIC; the UART console is
# bridged to telnet by QEMU's `-serial telnet:`). So this config is
# self-contained like configs/cov_an385: it enables the serial shell plus the
# cross-version contract shell surface directly, with no networking (no_fs has
# no SNMP, and the shell rides the serial bridge).
#
# Sample: samples/subsys/shell/shell_module — the same shell surface the x86
# contract hosts use, NOT the LLEXT loader. Board: mps2_an385.

# --- Shell over the UART (QEMU bridges UART0 to telnet via -serial telnet:) ---
# otto's zephyr-serial frame disables echo up front (`shell echo off`) and reads
# each command's code from the stock `retval` builtin — both are default-on
# Zephyr 3.x builtins, so no extra Kconfig is needed for the frame itself.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_KERNEL_SHELL=y

# Match the x86 contract hosts' shell sizing (common/otto-overlay.conf). no_fs
# carries no `fs write` hex payload, so the modest 512-byte buffer is ample.
CONFIG_SHELL_ARGC_MAX=64
CONFIG_SHELL_CMD_BUFF_SIZE=512

# --- Thread introspection (backs `kernel threads`) ---------------------------
# The same set the x86 3.7 host gets from common/otto-overlay.conf +
# otto-overlay-v3_7.conf; on 3.7 the SCHED_THREAD_USAGE pair drives the
# per-thread CPU% columns otto's monitoring parsers read.
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y

# --- Deliberately absent ------------------------------------------------------
# * No CONFIG_FILE_SYSTEM_SHELL — `fs read` must return `fs: command not found`
#   so EmbeddedFileTransfer's graceful-degradation path is exercised against a
#   real target (the whole point of the no_fs host).
# * No networking (NET_* / ETH_* / PCIE) — the shell rides the serial bridge and
#   no_fs runs no SNMP agent, so the LAN9118 NIC is left unconfigured.
# * No CONFIG_ARM_MPU=n / large SHELL_STACK_SIZE — those exist in cov_an385 only
#   for LLEXT relocation, which this host never does; the MPU stays on (stock).
