# otto Zephyr test-bed — FAT on RAM disk config delta.
#
# Layered onto `common/otto-overlay.conf`. The console file-transfer backend
# (EmbeddedFileTransfer) drives the stock `fs` shell commands — `fs read` /
# `fs write`. This config mounts a FAT filesystem on a RAM disk (the disk node
# is in app.overlay): the lightest QEMU-friendly option — no flash partition
# to carve up. The RAM disk is not persistent across reboots, which is fine
# for a test fixture.
#
# NOTE: these symbol names are the expected set for Zephyr 3.7 LTS but have
# not been build-verified — confirm with a real `west build` (see ../../README.md).

# --- IPv4 assignment (FAT instance) ------------------------------------------
# Host side of zeth-fat is 192.0.2.2; this Zephyr instance is 192.0.2.1.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# --- FAT on a RAM disk + fs shell -------------------------------------------

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_RAM=y

# A fresh RAM disk has no filesystem on it — let the FAT layer format it on
# first mount rather than requiring a pre-imaged disk.
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
