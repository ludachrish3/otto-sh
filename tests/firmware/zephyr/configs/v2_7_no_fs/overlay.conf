# otto Zephyr test-bed — "no filesystem" config delta (Zephyr 2.7).
#
# Layered onto `common/otto-overlay.conf`. Same role as v3_7_no_fs: exercise
# `EmbeddedFileTransfer`'s graceful-degradation path against a real device
# (no `fs` shell command present, console backend must error cleanly).
#
# No `app.overlay` exists for this config — `qemu_x86`'s stock devicetree is
# sufficient. The Vagrantfile build line omits `-DEXTRA_DTC_OVERLAY_FILE=`
# when no `app.overlay` is present in the config dir.

# --- IPv4 assignment (2.7 no-fs instance, /30 subnet 192.0.2.20/30) ----------
# Zephyr=192.0.2.21, host=192.0.2.22.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.21"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.22"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"
