# otto Zephyr test-bed — LittleFS on flash-simulator config delta (Zephyr 2.7).
#
# Layered onto `common/otto-overlay.conf`. LittleFS first shipped in Zephyr
# 2.0, so 2.7 supports it via the same Kconfig surface as 3.7 — same
# `CONFIG_FILE_SYSTEM_LITTLEFS`, same `zephyr,fstab,littlefs` DT binding.
#
# NOTE: symbol parity with 3.7 is the expectation, not a proof — confirm on
# first `vagrant provision zephyr`.

# --- IPv4 assignment (2.7 LittleFS instance, /30 subnet 192.0.2.16/30) -------
# Zephyr=192.0.2.17, host=192.0.2.18.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.17"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.18"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"

# --- LittleFS over the flash simulator + fs shell ----------------------------

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_DOUBLE_WRITES=y

CONFIG_FILE_SYSTEM_MKFS=y

# MMU virtual-mapping region — must be >= dram0 size (128 MiB, see
# app.overlay). Without this the kernel fails to map dram0 in full and
# the BSS-allocated flash sim overflows the linker region.
CONFIG_KERNEL_VM_SIZE=0x08000000
