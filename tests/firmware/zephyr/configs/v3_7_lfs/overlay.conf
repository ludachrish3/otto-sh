# otto Zephyr test-bed — LittleFS on flash-simulator config delta.
#
# Layered onto `common/otto-overlay.conf`. Backs the `fs` shell with LittleFS
# — the de-facto embedded-flash filesystem — over Zephyr's flash simulator.
# Distinct from the FAT-on-RAM-disk config (configs/v3_7_fat_ram/): LittleFS
# has different on-disk semantics (power-fail-safe, wear-leveling overhead,
# different mount cost), so exercising the otto console backend against both
# proves it is genuinely FS-agnostic.
#
# Why the flash simulator (not real flash): qemu_x86 has no persistent flash;
# the flash simulator gives Zephyr's flash API a RAM-backed implementation
# that LittleFS can mount and write through. Non-persistent across reboots —
# fine for a test fixture.
#
# NOTE: these symbol names + the DT binding in app.overlay are the expected
# set for Zephyr 3.7 LTS but have NOT been build-verified — confirm with a
# real `west build` (see ../../README.md).

# --- IPv4 assignment (LittleFS instance, /30 subnet 192.0.2.4/30) ------------
# Zephyr=192.0.2.5, host=192.0.2.6. See common/otto-overlay.conf for the /30
# rationale.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.5"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.6"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"

# --- LittleFS over the flash simulator + fs shell ----------------------------

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# The flash subsystem + the page-layout + map APIs LittleFS reads through.
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# RAM-backed flash implementation — gives LittleFS something to write to in
# QEMU without a real flash device.
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_DOUBLE_WRITES=y

# A fresh flash partition has no LittleFS image — let the FS format on first
# mount via the `zephyr,fstab` automount entry in app.overlay.
CONFIG_FILE_SYSTEM_MKFS=y
