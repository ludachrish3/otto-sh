# otto Zephyr test-bed — LittleFS on flash-simulator config delta (Zephyr 4.4).
#
# Layered onto `common/otto-overlay.conf`. Backs the `fs` shell with LittleFS
# — the de-facto embedded-flash filesystem — over Zephyr's flash simulator.
# Distinct from the FAT-on-RAM-disk config (configs/v3_7_fat_ram/): LittleFS
# has different on-disk semantics (power-fail-safe, wear-leveling overhead,
# different mount cost), so exercising the otto console backend against both
# proves it is genuinely FS-agnostic.
#
# Why the flash simulator (not real flash): qemu_x86 has no persistent flash;
# the flash simulator gives Zephyr's flash API a RAM-backed implementation
# that LittleFS can mount and write through. Non-persistent across reboots —
# fine for a test fixture.
#
# 4.4's LittleFS/flash-sim Kconfig + the app.overlay DT binding match 3.7's
# (build-verified on the matrix VM). 4.x's otto-observable deltas are at the
# command surface (fs cp/mv, ls size column, `kernel thread` subcommand tree),
# not in this Kconfig.

# --- IPv4 assignment (LittleFS instance, /30 subnet 192.0.2.28/30) -----------
# Zephyr=192.0.2.29, host=192.0.2.30. See common/otto-overlay.conf for the /30
# rationale.

CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.29"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.30"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.252"

# --- LittleFS over the flash simulator + fs shell ----------------------------

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# The flash subsystem + the page-layout + map APIs LittleFS reads through.
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# RAM-backed flash implementation — gives LittleFS something to write to in
# QEMU without a real flash device.
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_DOUBLE_WRITES=y

# A fresh flash partition has no LittleFS image — let the FS format on first
# mount via the `zephyr,fstab` automount entry in app.overlay.
CONFIG_FILE_SYSTEM_MKFS=y

# Basename length: LittleFS in Zephyr 4.4 has no Kconfig knob — its
# ``LFS_NAME_MAX`` is fixed at compile time inside the bundled ``lfs.h``
# (the upstream default, 255). The host-side ceiling is the binding one
# and lives in ``tests/lab_data/tech1/hosts.json`` as
# ``max_filename_len: 32`` (see ``EmbeddedHost.max_filename_len``).
# Tightening the device-side cap below 255 would require patching lfs.h
# or threading ``-DLFS_NAME_MAX`` through the build — out of scope.

# MMU virtual-mapping region. Must be >= the physical RAM region
# (``dram0``, expanded to 128 MiB in app.overlay to fit the 100 MiB
# RAM-backed flash simulator). The stock qemu_x86 default without ACPI
# is only ~8 MiB, which leaves the kernel unable to map dram0 in full.
# 0x08000000 = 128 MiB matches the dram0 size precisely.
CONFIG_KERNEL_VM_SIZE=0x08000000
