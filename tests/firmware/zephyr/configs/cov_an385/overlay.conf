# Coverage host base image (mps2_an385). Layered on Zephyr's stock LLEXT loader
# sample (samples/subsys/llext/shell_loader), NOT the shell_module the x86 hosts
# use. Product-agnostic loader enablement plus the otto ext_svc module (the
# base-owned service-thread helper — see ../../ext_svc/ and
# todo/testbed-request.md). The base carries NO coverage code, by policy:
# applications that want coverage ship the gcov runtime inside their own
# extension (../../../repo3/product does). See ../../../repo3/docs/feasibility.md.

# LLEXT requires the MPU off on Cortex-M (relocations write to loaded regions).
CONFIG_ARM_MPU=n

# Shell over the UART. QEMU bridges UART0 to telnet (-serial telnet:), so the
# firmware uses the *serial* backend; otto's telnet transport connects to the
# bridge. (The in-guest LAN9118 NIC can't receive a multi-frame load_hex line.)
CONFIG_SHELL_BACKEND_SERIAL=y

# Buffers sized for a >= 32 KB extension (~64 KB hex line + command overhead) —
# the basecamp request's headroom ask; repo3's ~16 KB extension fits a fortiori.
# 4 MB SRAM makes the bumps noise. RX ring stays modest: writers chunk the
# load_hex line (64 B / 15 ms), it never has to hold the whole command.
CONFIG_SHELL_CMD_BUFF_SIZE=81920
CONFIG_LLEXT_SHELL_MAX_SIZE=65536
CONFIG_LLEXT_HEAP_SIZE=128
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=8192

# otto ext_svc module (registered via -DEXTRA_ZEPHYR_MODULES, see Vagrantfile):
# base-owned service-thread helper + uart-pipe accessor, exported to extensions.
CONFIG_OTTO_EXT_SVC=y

# llext_load runs on the shell thread; its relocation work needs a large stack.
# With the MPU off a too-small shell stack overflows *silently* (hangs, no
# fault) on any load. The stock shell_loader sample sets this; do not drop it.
CONFIG_SHELL_STACK_SIZE=32768

# Quiet the LLEXT relocation debug so it doesn't interleave with otto's framing.
CONFIG_LLEXT_LOG_LEVEL_WRN=y
