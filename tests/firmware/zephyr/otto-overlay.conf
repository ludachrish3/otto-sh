# otto Zephyr test-bed application configuration.
#
# This is intentionally stock Zephyr — no otto-specific shell commands, no
# custom modules. The whole point of otto's embedded-host support is that it
# meets the target as-is; the firmware here only enables the standard Zephyr
# Kconfig options otto requires (the way otto requires sshd on a Unix host).

# --- Shell over telnet -------------------------------------------------------

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_KERNEL_SHELL=y

# --- Per-thread runtime stats (Phase 6: `kernel threads` CPU percentages) ----

CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# --- Networking: Ethernet (e1000) with static IPv4 ---------------------------
# The host side of zeth is 192.0.2.2; this Zephyr instance is 192.0.2.1. otto
# reaches the telnet shell at 192.0.2.1:23 through the SSH hop on the Ubuntu
# VM hosting QEMU.

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_QEMU_ETHERNET=y
# The shell_module sample has no networking layer of its own, so the overlay
# must supply the whole Ethernet driver chain. The QEMU-ethernet flag above
# only declares intent; the build aborts with "No Qemu ethernet driver
# configured" unless a real driver is enabled, and ETH_E1000 in turn depends
# on NET_L2_ETHERNET -> ETH_DRIVER and on PCIE (the e1000 is a PCIe NIC on
# qemu_x86, bound by the systemd unit's `-device e1000`).
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_DRIVER=y
CONFIG_PCIE=y
CONFIG_ETH_E1000=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# --- Filesystem + fs shell (Phase 5: console file transfer) ------------------
# Disabled in the initial Phase 1 spike — enabling these may require a backing
# storage devicetree overlay (CONFIG_DISK_DRIVER_RAM or a flash partition).
# Re-enable once Phase 5 is ready to depend on `fs read`/`fs write`.
