name = "repo2"
version = "1.0.4"
lab_data_type = "json"
labs = [
    "${sutDir}/../lab_data/tech2",
]
libs = [
    "${sutDir}/pylib",
]
tests = [
    "${sutDir}/tests"
]
init = [
    'repo2_instructions',
]

[docker]
registry_url = "docker.io"

[[docker.images]]
name = "worker"
dockerfile = "${sutDir}/docker/Dockerfile"
context = "${sutDir}/docker"

[[docker.composes]]
path = "${sutDir}/docker/compose.yml"
default_host = "grape_seed"
services = ["worker"]
