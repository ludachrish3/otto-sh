# Read the Docs build config.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html
# uv-on-RTD recipe: https://docs.astral.sh/uv/guides/integration/readthedocs/

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
    # Builds the React monitor dashboard (see the `install`/`pre_build` jobs
    # below) — version tracks the repo's .nvmrc.
    nodejs: "24"
  # `dot` renders the architecture-docs diagrams (sphinx.ext.graphviz /
  # inheritance_diagram); without it the -W build fails.
  # The lib* set is headless Chromium's runtime for the build-time GUI media
  # (scripts/capture_docs_media.py, hooked from docs/conf.py) — the same list
  # the Vagrantfile provisions on the dev VM for the dashboard e2e suite.
  apt_packages:
    - graphviz
    - libatk1.0-0t64
    - libxcomposite1
    - libxdamage1
    - libxext6
    - libxfixes3
    - libxrandr2
    - libgbm1
    - libasound2t64
    - libatspi2.0-0t64
  jobs:
    # RTD's build image ships `asdf` preinstalled. uv isn't on RTD's curated
    # `tools:` list, so we use asdf to install and pin it into PATH.
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    install:
      - uv sync --all-extras --dev
      # The Chromium binary itself (runtime libs come from apt_packages above).
      # If this breaks on an RTD image change, OTTO_DOCS_MEDIA=placeholder in
      # the RTD environment variables ships degraded-but-green docs meanwhile.
      - uv run playwright install chromium
      - cd web && npm ci
    pre_build:
      # capture_docs_media.py (hooked from docs/conf.py) drives a real
      # MonitorServer to screenshot the dashboard — post-cutover that
      # server refuses to start without a built React dashboard, so
      # `dist/` must exist before Sphinx runs. `make web` also re-runs the
      # type-drift gate (web/src/api/types.gen.ts vs. the live pydantic
      # models) and the air-gap grep, same as CI (.github/workflows/ci.yml).
      - make web
    build:
      html:
        - uv run sphinx-build -W -b html docs/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
