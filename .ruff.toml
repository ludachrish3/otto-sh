target-version = "py310"
line-length = 100
indent-width = 4
extend-exclude = [".vscode", ".idea", "__pycache__", ".python-version", ".ruff.toml", "ruff.toml", "setup.cfg", "pyproject.toml"]

[format]
indent-style = "space"
line-ending = "lf"
quote-style = "double"
docstring-code-format = true
docstring-code-line-length = 100

[lint]
select = ["ALL"]
ignore = [
    # --- formatter-owned (ruff's documented formatter-conflict set) ---
    "W191", "E111", "E114", "E117", "D206", "D300",
    "Q000", "Q001", "Q002", "Q003",
    "COM812", "COM819",
    "ISC001", "ISC002",

    # --- otto deliberate patterns  ---
    "TID252",   # relative imports (from ..x import)
    "PLC0415",  # lazy/local imports (deliberate, startup speed)
    "G004",     # f-string in logging calls
    "TRY003", "EM101", "EM102", "EM103",  # terse inline exception messages
    "ASYNC230", "ASYNC240",  # blocking file I/O in async: rule premises trio/anyio; otto is asyncio, flagged sites are brief/off-hot-path FS ops

    # --- annotation-safety (protect Sphinx-nitpicky + py3.10) ---
    "FA100", "FA102",          # would force `from __future__ import annotations`
    "TC001", "TC002", "TC003", # would hide annotation imports under TYPE_CHECKING
    "UP037",                   # would unquote forward refs -> NameError on 3.10

    # --- low-value / noisy ---
    "FBT001", "FBT002", "FBT003",  # boolean-trap
    "FIX002", "TD002", "TD003",    # TODO comment formatting
    "CPY001",                      # mandatory copyright header (otto uses none)
    "ANN401",                      # typing.Any

    # --- docstring conventions otto documents elsewhere ---
    "D105",  # magic-method docstrings: dunder semantics are conventional; class docstring covers them
    "D107",  # __init__ docstrings: construction is documented in the class docstring (D101), per numpy/google style
]

[lint.per-file-ignores]
"tests/**" = ["S101", "D", "PLR2004", "SLF001", "ANN", "ARG", "S104", "S105", "S106", "S108", "S110", "S310", "S603", "S607", "INP001", "E402"]  # S*: tests use fake creds / subprocess harnesses / remote-host paths — not a security surface
"scripts/**" = ["INP001", "T201"]  # scripts are CLI tools: namespace packages + print() are by design
"docs/conf.py" = ["INP001", "ANN", "D"]  # Sphinx build config — not autodoc'd; annotations and pydocstyle add nothing here
"**/__init__.py" = ["F401"]

[lint.pylint]
# Maximum number of arguments for function / method
max-args = 10
# Maximum number of boolean expressions in a if statement
max-bool-expr = 10
# Maximum number of branch for function / method body
max-branches = 100
# Maximum number of locals for function / method body
max-locals = 15
# Maximum number of nested blocks for function / method body
max-nested-blocks = 5
# Maximum number of positional arguments allowed for a function or method definition
max-positional-args = 10
# Maximum number of public methods for a class (see R0904).
max-public-methods = 30
# Maximum number of return statements allowed for a function or method body
max-returns = 10
# Maximum number of statements in function / method body
max-statements = 1000

[lint.pydocstyle]
convention = "pep257"

[lint.mccabe]
max-complexity = 20
